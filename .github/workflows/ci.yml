name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check openkiln/ tests/
          ruff format --check openkiln/ tests/

      - name: Test
        run: pytest tests/ -v

  validate-skills:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate skill manifests
        run: |
          for skill_dir in openkiln/skills/*/; do
            if [ -f "$skill_dir/skill.toml" ]; then
              skill_name=$(basename "$skill_dir")
              echo "Validating: $skill_name"
              python -c "
          import tomllib, sys
          with open('${skill_dir}skill.toml', 'rb') as f:
              m = tomllib.load(f)
          s = m.get('skill', {})
          errors = []
          if not s.get('name'): errors.append('missing name')
          if not s.get('version'): errors.append('missing version')
          if not s.get('description'): errors.append('missing description')
          if s.get('name') != '${skill_name}': errors.append(f'name mismatch: {s.get(\"name\")} != ${skill_name}')
          if errors:
              print(f'  FAIL: {\", \".join(errors)}')
              sys.exit(1)
          print(f'  OK')
          "
            fi
          done

      - name: Check schema SQL
        run: |
          pip install -e ".[dev]"
          for skill_dir in openkiln/skills/*/; do
            schema_dir="${skill_dir}schema"
            if [ -d "$schema_dir" ]; then
              skill_name=$(basename "$skill_dir")
              echo "Checking schema: $skill_name"
              python -c "
          import sqlite3, sys
          from pathlib import Path
          schema_dir = Path('$schema_dir')
          conn = sqlite3.connect(':memory:')
          for f in sorted(schema_dir.glob('*.sql')):
              conn.executescript(f.read_text())
          tables = [r[0] for r in conn.execute(\"SELECT name FROM sqlite_master WHERE type='table' AND name != 'sqlite_sequence'\").fetchall()]
          print(f'  Tables: {\", \".join(tables)}')
          if not tables:
              print('  WARN: no tables created')
          "
            fi
          done
