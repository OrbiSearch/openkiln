[skill]
name = "crm"
version = "0.1.0"
description = "Contact and company data management."
author = "OrbiSearch"

[[skill.provides]]
type = "source"
name = "crm.contacts"
description = "Read contacts from crm.db"
module = "openkiln.skills.crm.workflow"
class = "CrmSource"

[[skill.provides]]
type = "source"
name = "crm.companies"
description = "Read companies from crm.db"
module = "openkiln.skills.crm.workflow"
class = "CrmSource"

[[skill.provides]]
type = "sink"
name = "crm.update"
description = "Update contacts or companies in crm.db"
module = "openkiln.skills.crm.workflow"
class = "CrmSink"

[skill.requires]
skills = []

[[skill.record_types]]
name = "contact"
dedup_key = "email"

[[skill.record_types]]
name = "company"
dedup_key = "domain"
